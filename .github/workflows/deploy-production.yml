name: Deploy PC-Tech Production

on:
  push:
    branches:
      - production

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Cloudflare Pages Functions
        run: npx wrangler pages functions build functions --outfile dist/_worker.js --output-routes-path dist/_routes.json --compatibility-date=2026-07-09

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=pc-tech-production --branch=production
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
